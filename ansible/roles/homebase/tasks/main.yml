---
# tasks file for homebase
- name: Install base packages for homebase
  apt:
    name:
      - asciinema
      - xfce4
      - xfce4-goodies
      - tigervnc-standalone-server
      - tigervnc-viewer
      - zile
      - emacs
      - xclip
      - proxychains4
    state: present

- name: Move skel to skel
  copy:
    src: files/skel/
    dest: /etc/skel/

- name: Set executable bit on /etc/skel/.vnc/xstartup
  file:
    path: /etc/skel/.vnc/xstartup
    mode: 0755

- name: Add block to /etc/skel/.profile to run setup-xfce4-vnc on first login
  blockinfile:
    path: "/etc/skel/.profile"
    block: "{{ lookup('file', 'files/skel-append-profile.sh') }}"

- name: Ensure polkit path exists
  file:
    path: /etc/polkit-1/localauthority/50-local.d
    state: directory
    recurse: yes
    mode: 0755

- name: Xfce color profile
  copy:
    src: files/45-allow-colord.pkla
    dest: /etc/polkit-1/localauthority/50-local.d/45-allow-colord.pkla
    mode: 0755

- name: Set xfce 4 terminal to the default shell
  command:
    cmd: update-alternatives --set x-terminal-emulator /usr/bin/xfce4-terminal.wrapper

- name: Restart polkit
  systemd:
    name: polkit
    state: restarted

- name: Hashit
  copy:
    src: files/hashit
    dest: /usr/local/bin/hashit
    owner: root
    group: root
    mode: 0755

- name: Implant_cryptor
  copy:
    src: files/implant_cryptor.py
    dest: /usr/local/bin/implant_cryptor
    owner: root
    group: root
    mode: 0755

- name: Remove unwanted xfce4 utilities
  apt:
    name:
     - xfce4-screensaver
     - xfce4-power-manager
    state: absent

- name: Kill the removed xfce4 utilities
  command:
    cmd: killall "{{ item }}"
  with_items:
    - xfce4-screensaver
    - xfce4-power-manager
  register: result
  failed_when: result.rc >= 2

- name: Add system-wide UTC PS1 to /etc/bash.bashrc
  blockinfile:
    path: /etc/bash.bashrc
    block: |
      # System-wide UTC PS1 for all interactive shells
      if [[ $- == *i* ]] && ! [ -n "${SUDO_USER}" -a -n "${SUDO_PS1}" ]; then
          PROMPT_COMMAND='PS1="\[\e[36m\]$(TZ=UTC date "+%Y-%m-%d %H:%M:%S UTC")\[\e[0m\] ~ \
      \[\e[32m\]\u@\h\[\e[0m\]:\
      \[\e[31m\]\w\[\e[0m\]\$ "'
      fi
    marker: "# {mark} ANSIBLE UTC PS1"
    create: yes
    backup: yes

- name: Create /engagement directory
  ansible.builtin.file:
    path: /engagement
    state: directory
    owner: root
    group: redteam
    mode: "2775"