---
# tasks file for backflips-v2
- name: Create flip group
  group:
    name: flip
    state: present
    system: true

- name: Create flip user
  user:
    name: flip
    group: flip
    state: present
    system: true
    create_home: false
    home: /opt/backflips
    shell: /usr/sbin/nologin

- name: Create home
  file:
    path: /opt/backflips
    owner: flip
    group: flip
    mode: 0755
    state: directory

- name: Copy files to host
  copy:
    src: files/flip_files/
    dest: /opt/backflips/
    owner: flip
    group: flip

- name: Ensure backflips SSH directory exists
  file:
    path: "/opt/backflips/etc/ssh/{{ item }}"
    state: directory
    owner: flip
    group: flip
    mode: '0755'
  loop: "{{ domain_names }}"

- name: Copy SSHd Configure
  copy:
    src: files/etc/ssh/sshd_config
    dest: /opt/backflips/etc/ssh/config
    owner: flip
    group: flip
    mode: '0644'

- name: Generate rsa keypairs
  community.crypto.openssh_keypair:
    path: "/opt/backflips/etc/ssh/{{ item }}/ssh_host_rsa_key"
    type: rsa
    size: 4096
    group: flip
    owner: flip
  loop: "{{ domain_names }}"

- name: Generate ed25519 keypairs
  community.crypto.openssh_keypair:
    path: "/opt/backflips/etc/ssh/{{ item }}/ssh_host_ed25519_key"
    type: ed25519
    owner: flip
    group: flip
  loop: "{{ domain_names }}"

- name: Configure Dockerfiles
  copy:
    src: files/Dockerfile
    dest: /opt/backflips/Dockerfile
    owner: flip
    group: flip

- name: Configure Containers
  template:
    src: templates/docker-compose.yml.j2
    dest: /opt/backflips/docker-compose.yml
    mode: 0644
    owner: flip

- name: Set Ownership and Perms
  ansible.builtin.file:
    path: /opt/backflips
    owner: flip
    group: flip
    mode: '0755'
    recurse: yes

- name: Set Key Perms
  ansible.builtin.file:
    path: "/opt/backflips/etc/ssh/{{ item }}"
    owner: flip
    group: flip
    mode: '0600'
    recurse: yes
  loop: "{{ domain_names }}"

- name: Copy SSHd Configure
  copy:
    src: files/etc/ssh/sshd_config
    dest: /opt/backflips/etc/ssh/config
    owner: flip
    group: flip
    mode: '0644'

- name: Set SSHD Config Perms
  ansible.builtin.file:
    path: "/opt/backflips/etc/ssh/config"
    owner: flip
    group: flip
    mode: '0755'

- name: Check for OpenSSH Docker Image
  docker_image:
    name: lscr.io/linuxserver/openssh-server:latest
    source: pull
  register: docker_image_pull
  ignore_errors: yes

- name: Start containers
  command: docker compose -f /opt/backflips/docker-compose.yml up -d
  args:
    chdir: /opt/backflips

- name: "Init empty dictionary for output"
  set_fact:
    mapping: {}

- name: Grab internal backflip container IPs
  command: "docker inspect -f '{{ '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' }}' backflip_{{ item }}"
  loop: "{{ domain_names | map('splitext') | map('first') | list }}"
  loop_control:
    label: "{{ item }}"
  register: result

- name: Populate dictionary with domain names and IPs
  set_fact:
    mapping: "{{ mapping | combine({ (item.item | splitext)[0]: item.stdout }) }}"
  with_items: "{{ result.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Save the dictionary to a file
  copy:
    content: "{{ mapping | to_nice_json }}"
    dest: "/opt/backflips/ip_mapping.json"
    mode: '0644'
